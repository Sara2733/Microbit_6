<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Micro:bit – Rilevamento Movimento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #00f5a0;
    --accent2: #00b4ff;
    --danger: #ff4d4d;
    --text: #e8e8f0;
    --muted: #555570;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }

  /* background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
  }

  .container {
    position: relative;
    width: 100%;
    max-width: 420px;
    z-index: 1;
  }

  header {
    margin-bottom: 32px;
    text-align: left;
  }

  .label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    line-height: 1.1;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  /* STATUS BAR */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 24px;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
    flex-shrink: 0;
  }

  .dot.connected {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  .dot.disconnected {
    background: var(--danger);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #statusText {
    color: var(--muted);
    flex: 1;
  }

  #statusText.connected { color: var(--accent); }
  #statusText.disconnected { color: var(--danger); }

  /* MOVEMENT CARD */
  .movement-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
    margin-bottom: 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: border-color 0.4s;
  }

  .movement-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 40px rgba(0,245,160,0.08);
  }

  .movement-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,245,160,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .movement-icon {
    font-size: 56px;
    margin-bottom: 16px;
    transition: transform 0.3s ease;
    line-height: 1;
  }

  .movement-icon.animate {
    animation: bounce 0.4s ease;
  }

  @keyframes bounce {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  #movementDisplay {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
    transition: color 0.3s;
  }

  #movementDisplay.fermo { color: var(--muted); }
  #movementDisplay.corsa { color: var(--accent); }
  #movementDisplay.laterale { color: var(--accent2); }

  .raw-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 8px;
  }

  #rawData {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-top: 4px;
    min-height: 16px;
  }

  /* BUTTONS */
  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  button {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
    padding: 16px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    background: var(--surface);
    color: var(--text);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  button:hover:not(:disabled) {
    transform: translateY(-2px);
  }

  button:active:not(:disabled) {
    transform: translateY(0);
  }

  #connectBtn {
    border-color: var(--accent);
    color: var(--accent);
  }

  #connectBtn:hover:not(:disabled) {
    background: rgba(0,245,160,0.1);
    box-shadow: 0 4px 20px rgba(0,245,160,0.15);
  }

  #disconnectBtn {
    border-color: var(--danger);
    color: var(--danger);
  }

  #disconnectBtn:hover:not(:disabled) {
    background: rgba(255,77,77,0.1);
    box-shadow: 0 4px 20px rgba(255,77,77,0.15);
  }

  button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  footer {
    margin-top: 32px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-align: center;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="label">Machine Learning</div>
    <h1>Micro:bit<br><span>Movimento</span></h1>
  </header>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="statusText">Non connesso</span>
  </div>

  <div class="movement-card" id="movementCard">
    <div class="movement-icon" id="movementIcon">⏸️</div>
    <div id="movementDisplay" class="fermo">—</div>
    <div class="raw-label">segnale ricevuto</div>
    <div id="rawData">—</div>
  </div>

  <div class="buttons">
    <button id="connectBtn" onclick="connectMicrobit()">🔗 Connetti</button>
    <button id="disconnectBtn" onclick="disconnectMicrobit()" disabled>⛔ Disconnetti</button>
  </div>

  <footer>micro:bit BLE UART · ML Movement Detection</footer>
</div>

<script src="app.js"></script>
</body>
</html>
